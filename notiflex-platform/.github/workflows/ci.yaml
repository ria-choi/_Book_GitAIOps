name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'write' # Allow writing back to the repository
      id-token: 'write'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: "projects/984029714229/locations/global/workloadIdentityPools/notiflex-pool/providers/notiflex-gh-provider"
        service_account: "notiflex-ci-sa@project-75fce205-dfa5-4975-a56.iam.gserviceaccount.com"

    - name: Configure Docker
      run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

    - name: Build and push image
      id: build-push
      run: |
        IMAGE="asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api:sha-${GITHUB_SHA::7}"
        docker build -t "$IMAGE" app/
        docker push "$IMAGE"
        echo "IMAGE_URI=$IMAGE" >> $GITHUB_OUTPUT

    - name: Update manifest and push
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        echo "Updating image to ${{ steps.build-push.outputs.IMAGE_URI }}"
        sed -i "s|image:.*|image: ${{ steps.build-push.outputs.IMAGE_URI }}|g" k8s/smb/deployment.yaml
        
        git add k8s/smb/deployment.yaml
        
        # Commit only if there are changes
        if ! git diff --staged --quiet; then
          git commit -m "ci: Update image tag to ${{ steps.build-push.outputs.IMAGE_URI }}"
          git push
        else
          echo "No changes to commit."
        fi
